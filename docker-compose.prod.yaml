version: '3.9'

services:
  serve:
    container_name: ai-operation-prod
    image: ai-operation:prod
    platform: linux/amd64
    build:
      context: .
      target: prod
      dockerfile: ./Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Production: ไม่ mount code (เพื่อความปลอดภัย)
      # Mount เฉพาะ env file
      - ./env.properties:/app/env.properties
    environment:
      - PYTHONPATH=/app/code
    env_file:
      - ./env.properties
    restart: unless-stopped

networks:
  default:
    name: ai-operation-network
